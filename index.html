<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje aplikace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="header-left">
                <button id="hamburger-btn" class="hamburger" aria-label="Otevřít menu">☰</button>
                <h1>Moje aplikace</h1>
            </div>
        </div>
    </header>

    <!-- Hamburger side menu -->
    <div id="hamburger-backdrop" class="hamburger-backdrop hidden"></div>
    <aside id="side-menu" class="side-menu">
        <div class="side-menu-header">
            <h2>Menu</h2>
            <button id="close-menu" class="close-btn" aria-label="Zavřít menu">×</button>
        </div>
        <nav class="side-menu-nav">
            <a href="index.html" class="active">🏠 Domů</a>
            <a href="recepty.html">🍳 Recepty</a>
            <span class="menu-disabled">💪 Cvičení <em>(připravujeme)</em></span>
            <span class="menu-disabled">🎮 Hry <em>(připravujeme)</em></span>
        </nav>
        <div class="side-menu-section">
            <h3>Nastavení</h3>
            <div id="menu-auth-area"></div>
        </div>
        <div class="side-menu-section side-menu-footer">
            <h3>O aplikaci</h3>
            <p>Moje aplikace v1.0</p>
        </div>
    </aside>

    <main class="container">
        <section class="home-hero">
            <h2>Vítej zpátky!</h2>
            <p class="home-subtitle">Vyber si, co chceš dnes dělat.</p>
        </section>

        <section class="tile-grid">
            <a href="recepty.html" class="tile tile-recipes">
                <div class="tile-icon">🍳</div>
                <h3>Recepty</h3>
                <p>Zaznamenávej a prohlížej svoje recepty na vaření.</p>
            </a>

            <div class="tile tile-empty" aria-disabled="true">
                <div class="tile-icon">💪</div>
                <h3>Cvičení</h3>
                <p>Připravujeme…</p>
            </div>

            <div class="tile tile-empty" aria-disabled="true">
                <div class="tile-icon">🎮</div>
                <h3>Hry</h3>
                <p>Připravujeme…</p>
            </div>
        </section>
    </main>

    <script type="module" src="home.js"></script>
</body>
</html>
