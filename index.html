<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje aplikace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="header-left">
                <button id="hamburger-btn" class="hamburger" aria-label="Otevřít menu">☰</button>
                <h1>Moje aplikace</h1>
            </div>
        </div>
    </header>

    <!-- Hamburger side menu (injektuje navigation.js) -->
    <div id="side-menu-root"></div>

    <main class="container">
        <section class="home-hero">
            <h2>Vítej zpátky!</h2>
            <p class="home-subtitle">Vyber si, co chceš dnes dělat.</p>
        </section>

        <section class="tile-grid">
            <a href="recepty.html" class="tile tile-recipes">
                <div class="tile-icon">🍳</div>
                <h3>Recepty</h3>
                <p>Zaznamenávej a prohlížej svoje recepty na vaření.</p>
            </a>

            <a href="rozpocet.html" class="tile tile-budget">
                <div class="tile-icon">💰</div>
                <h3>Rozpočet</h3>
                <p>Sleduj svůj měsíční rozpočet a denní útratu.</p>
            </a>

            <a href="cviceni.html" class="tile tile-workout">
                <div class="tile-icon">💪</div>
                <h3>Cvičení</h3>
                <p>Zaznamenávej si tréninky a sleduj svůj progress.</p>
            </a>

            <div class="tile tile-empty" aria-disabled="true">
                <div class="tile-icon">🎮</div>
                <h3>Hry</h3>
                <p>Připravujeme…</p>
            </div>
        </section>
    </main>

    <script type="module" src="home.js"></script>
</body>
</html>
