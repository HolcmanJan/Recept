<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje záložky</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container header-inner">
            <h1>Moje záložky</h1>
        </div>
    </header>

    <main class="container">
        <section class="bookmarks-intro">
            <p>Vlož URL a vytvoří se dlaždice s náhledem stránky.</p>
        </section>

        <div class="bookmarklet-bar">
            <span class="bookmarklet-label">Lepší náhledy:</span>
            <a id="bookmarklet-link" class="bookmarklet-btn" href="#" title="Přetáhni do lišty záložek">
                📌 Uložit stránku
            </a>
            <span class="bookmarklet-hint">← přetáhni do záložkové lišty prohlížeče</span>
        </div>

        <form id="bookmark-form" class="bookmark-form">
            <input
                type="url"
                id="bookmark-url"
                placeholder="https://example.com"
                required
                autocomplete="off"
            >
            <button type="button" class="btn btn-secondary" id="bookmark-paste" title="Vložit ze schránky">📋</button>
            <button type="submit" class="btn btn-primary" id="bookmark-submit">Přidat</button>
        </form>

        <p id="bookmark-status" class="bookmark-status hidden"></p>

        <nav class="bookmark-tabs" id="bookmark-tabs">
            <button class="bookmark-tab active" data-tab="unassigned">Ostatní</button>
            <button class="bookmark-tab" data-tab="1">Složka 1</button>
            <button class="bookmark-tab" data-tab="2">Složka 2 🔒</button>
            <button class="bookmark-tab" data-tab="3">Složka 3</button>
            <button class="bookmark-tab" data-tab="4">Složka 4</button>
            <button class="bookmark-tab" data-tab="reddit">Reddit</button>
        </nav>

        <section class="bookmark-featured hidden" id="bookmark-featured">
            <div class="bookmark-featured-head">
                <span class="bookmark-featured-title">Náhodný výběr</span>
                <div class="bookmark-featured-actions">
                    <button type="button" id="featured-fix" class="bookmark-featured-refresh" aria-label="Opravit chybějící náhledy" title="Opravit chybějící náhledy">🖼</button>
                    <button type="button" id="featured-refresh" class="bookmark-featured-refresh" aria-label="Přegenerovat výběr" title="Přegenerovat výběr">↻</button>
                </div>
            </div>
            <div class="bookmark-featured-grid" id="bookmark-featured-grid"></div>
        </section>

        <div id="bookmarks-grid" class="bookmarks-grid"></div>

        <p id="bookmarks-empty" class="empty-state hidden">
            Zatím tu nejsou žádné záložky. Vlož nahoře první URL!
        </p>

        <div id="scroll-sentinel" class="scroll-sentinel"></div>

        <p id="bookmarks-end" class="bookmarks-end hidden">Už není co načíst.</p>
    </main>

    <div id="enc-overlay" class="enc-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="enc-title">
        <div class="enc-dialog">
            <h2 id="enc-title" class="enc-dialog-title"></h2>
            <p id="enc-desc" class="enc-dialog-desc"></p>
            <input type="password" id="enc-password" class="enc-input" placeholder="Heslo" autocomplete="current-password">
            <p id="enc-error" class="enc-error hidden"></p>
            <div class="enc-actions">
                <button type="button" id="enc-submit" class="btn btn-primary">Odemknout</button>
                <button type="button" id="enc-skip" class="btn btn-secondary hidden">Přeskočit</button>
            </div>
        </div>
    </div>

    <script type="module" src="zalozky.js"></script>
</body>
</html>
