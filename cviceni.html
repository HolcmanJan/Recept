<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cvičení</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="header-left">
                <button id="hamburger-btn" class="hamburger" aria-label="Otevřít menu">☰</button>
                <h1>Cvičení</h1>
            </div>
        </div>
    </header>

    <div id="side-menu-root"></div>

    <main class="container">
        <!-- Domovský pohled -->
        <section id="view-home" class="workout-view">
            <div class="workout-hero">
                <button id="btn-start-workout" class="btn btn-primary btn-large">
                    ▶ Zahájit nový trénink
                </button>
            </div>

            <section class="workout-section">
                <h3>Šablony</h3>
                <div id="templates-list" class="templates-list"></div>
                <p id="templates-empty" class="empty-state hidden">
                    Zatím tu nejsou žádné šablony. Po skončení tréninku ho můžeš uložit jako šablonu.
                </p>
            </section>

            <section class="workout-section">
                <h3>Historie tréninků</h3>
                <div id="history-list" class="history-list"></div>
                <p id="history-empty" class="empty-state hidden">
                    Zatím jsi nedokončil žádný trénink.
                </p>
            </section>
        </section>

        <!-- Aktivní trénink -->
        <section id="view-active" class="workout-view hidden">
            <div class="workout-head">
                <div>
                    <input type="text" id="active-title" class="workout-title-input" value="Trénink" aria-label="Název tréninku">
                    <p class="workout-timer" id="active-timer">00:00</p>
                </div>
                <div class="workout-head-actions">
                    <button id="btn-cancel-workout" class="btn btn-secondary btn-sm">Zrušit</button>
                    <button id="btn-finish-workout" class="btn btn-primary btn-sm">Ukončit</button>
                </div>
            </div>

            <div class="workout-total-card">
                <span>Celkový objem</span>
                <strong id="active-total">0 kg</strong>
            </div>

            <div id="active-exercises" class="active-exercises"></div>

            <button id="btn-add-exercise" class="btn btn-secondary btn-full">
                + Přidat cvik
            </button>
        </section>
    </main>

    <!-- Výběr cviku -->
    <div id="picker-modal" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-backdrop" id="picker-backdrop"></div>
        <div class="modal-content modal-picker">
            <div class="modal-head">
                <h3>Vyber cvik</h3>
                <button id="picker-close" class="close-btn" aria-label="Zavřít">×</button>
            </div>
            <div class="modal-body">
                <input type="text" id="picker-search" class="picker-search" placeholder="Hledat cvik…">
                <div class="picker-filters" id="picker-filters"></div>
                <div class="picker-list" id="picker-list"></div>
            </div>
        </div>
    </div>

    <!-- Ukončení tréninku -->
    <div id="finish-modal" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-backdrop" id="finish-backdrop"></div>
        <div class="modal-content">
            <div class="modal-head">
                <h3>Souhrn tréninku</h3>
                <button id="finish-close" class="close-btn" aria-label="Zavřít">×</button>
            </div>
            <div class="modal-body">
                <div class="workout-total-card workout-total-lg">
                    <span>Celkový objem</span>
                    <strong id="finish-total">0 kg</strong>
                </div>
                <div id="finish-summary" class="finish-summary"></div>
                <div class="finish-template">
                    <label class="settings-toggle">
                        <span class="settings-item-body">
                            <strong>Uložit jako šablonu</strong>
                            <span>Cviky a sety se uloží jako předloha pro příště.</span>
                        </span>
                        <input type="checkbox" id="finish-save-template">
                    </label>
                    <input type="text" id="finish-template-name" class="finish-template-name hidden" placeholder="Název šablony">
                </div>
            </div>
            <div class="modal-actions">
                <button id="finish-cancel" class="btn btn-secondary">Pokračovat v tréninku</button>
                <button id="finish-confirm" class="btn btn-primary">Uložit trénink</button>
            </div>
        </div>
    </div>

    <script type="module" src="cviceni.js"></script>
</body>
</html>
