<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rozpočet</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="header-left">
                <button id="hamburger-btn" class="hamburger" aria-label="Otevřít menu">☰</button>
                <h1>Rozpočet</h1>
            </div>
        </div>
    </header>

    <div id="side-menu-root"></div>

    <main class="container">
        <!-- Nastavení rozpočtu -->
        <section class="budget-header">
            <div class="budget-period" id="budget-period"></div>
            <div class="budget-input-row">
                <label for="budget-amount">Rozpočet na období:</label>
                <div class="budget-input-wrap">
                    <input type="number" id="budget-amount" min="0" step="100" placeholder="0">
                    <span class="budget-currency">Kč</span>
                </div>
            </div>
        </section>

        <!-- Souhrn -->
        <section class="budget-summary" id="budget-summary">
            <div class="budget-stat">
                <span class="budget-stat-label">Celkový rozpočet</span>
                <span class="budget-stat-value" id="stat-total">0 Kč</span>
            </div>
            <div class="budget-stat">
                <span class="budget-stat-label">Utraceno</span>
                <span class="budget-stat-value" id="stat-spent">0 Kč</span>
            </div>
            <div class="budget-stat">
                <span class="budget-stat-label">Zůstatek</span>
                <span class="budget-stat-value" id="stat-remaining">
                    <span id="stat-remaining-value">0 Kč</span>
                    <span id="stat-remaining-arrow" class="budget-arrow hidden"></span>
                </span>
            </div>
            <div class="budget-stat">
                <span class="budget-stat-label">Denní budget</span>
                <span class="budget-stat-value" id="stat-daily">0 Kč</span>
            </div>
        </section>

        <!-- Kalendář -->
        <section class="budget-calendar" id="budget-calendar"></section>

        <!-- Modal pro zadání útraty -->
        <div id="expense-modal" class="expense-modal hidden">
            <div class="expense-modal-backdrop"></div>
            <div class="expense-modal-content">
                <h3 id="expense-modal-title"></h3>
                <div class="expense-modal-body">
                    <div class="expense-list" id="expense-list"></div>
                    <div class="expense-add-row">
                        <input type="text" id="expense-desc" placeholder="Popis (volitelné)">
                        <input type="number" id="expense-amount" min="0" step="1" placeholder="Částka">
                        <button id="expense-add-btn" class="btn btn-primary btn-sm">Přidat</button>
                    </div>
                </div>
                <div class="expense-modal-footer">
                    <span id="expense-day-total"></span>
                    <button id="expense-close-btn" class="btn btn-secondary btn-sm">Zavřít</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="rozpocet.js"></script>
</body>
</html>
